<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" type="text/css" href="{% static 'blog/styles.css' %}">
	<link rel="icon" href="./favicon.png">

	<title>Blog Template</title>


</head>

<body>
	<main>
		<div class="post-container">
			<div class="post-wrapper">
				<div class="post-preview" style="border-radius: 15px;">
					<span class="post-title">[postTitle]</span>
					<button class="unwrap-btn btn">
						<i class="fa-solid fa-chevron-down"></i>
					</button>
				</div>

				<div class="post" style="border-radius: 0 0 15px 15px;">

					<div class="created-by">
						<span class="author">Author: <a href="#" class="username">[username]</a></span>
						<div class="mail-wrapper">
							<span class="user-mail" id="[username]">[usermail]</span>
							<div class="pop-up pop-up__copied" style="opacity: 0;">
								<i class="fa-solid fa-check"></i><span>Copied!</span>
							</div>
						</div>
					</div>

					<p class="post-content">
						[postContent]
					</p>

					<div class="post-data">
						<div class="time-data">
							<div class="created-wrapper">
								<span class="subtext"><i class="fa-solid fa-newspaper"></i> Created: </span>
								<span class="date-created">[postCreatedDate]</span>
							</div>

							<div class="edited-wrapper">
								<span class="subtext"><i class="fa-solid fa-pencil"></i> Edited: </span>
								<span class="date-edited">[postEditedDate]</span>
							</div>
						</div>

						<div class="likes-data">
							<div class="likes-wrapper">
								<span class="likes-counter" data-likes="[likesCount]">[likesCount]</span>
								<button class="btn like-btn">
									<i class="fa-solid fa-heart"></i>
								</button>
							</div>
						</div>
					</div>

					<div class="comments-preview" style="border-radius: 0 0 15px 15px;">
						<span class="comments-title">Comments</span>
						<button class="unwrap-btn btn">
							<i class="fa-solid fa-chevron-down"></i>
						</button>
					</div>
				</div>
			</div>

			<div class="comments-wrapper">
				<div class="comments">
					<div class="comment" dataset="[commentID]">

						<div class="user-data">
							<a href="#" class="username">[username]</a>
							<div class="mail-wrapper">
								<span class="user-mail" id="[username]">[usermail]</span>
								<div class="pop-up pop-up__copied" style="opacity: 0;">
									<i class="fa-solid fa-check"></i><span>Copied!</span>
								</div>
							</div>
						</div>

						<p class="comment-content">
							[commentContent]
						</p>

						<div class="time-data__comment">
							<span class="created-wrapper">
								<i class="fa-solid fa-comment"></i>
								<span class="subtext">Created: </span>
								<span class="date-created">[commentCreatedDate]</span>
							</span>

							<span class="edited-wrapper">
								<i class="fa-solid fa-pencil"></i>
								<span class="subtext">Edited: </span>
								<span class="date-edited">[commentEditedDate]</span>
							</span>
						</div>

					</div>
				</div>
			</div>

		</div>
	</main>

	<script src="{% static 'blog/handler.js' %}" type="text/javascript"></script>
</body>

</html>
