version: "2"


services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

  postgres:
    image: postgres
    container_name: postgres
    environment:
      - POSTGRES_USER=$USER
      - POSTGRES_PASSWORD=$PASSWORD
    ports:
      - "5432:5432"

    env_file:
      - .env
  blog:
    build: .
    volumes:
      - .:/app
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
